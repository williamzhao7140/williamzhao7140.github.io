<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dove</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/cocogoose" />

    <style>
      :root {
        --dove-bg: #faf9f6;
        --dove-text: #171717;
        --dove-muted: #666;
      }
    </style>
  </head>
  <body class="min-h-screen bg-[var(--dove-bg)] text-[var(--dove-text)] [font-family:'COCOGOOSE',ui-sans-serif,system-ui]">
    <div class="relative flex min-h-screen w-full justify-center overflow-hidden">
      <div class="relative flex min-h-screen w-full max-w-6xl flex-col px-5 pb-24 pt-24 md:px-12">
        <a class="absolute left-5 top-6 z-20 inline-flex items-center md:left-12 md:top-8" href="/">
          <span class="text-xl font-semibold tracking-tight">Dove</span>
        </a>

        <div class="flex flex-1 items-center">
          <div class="grid w-full items-center gap-10 md:grid-cols-[minmax(0,6fr)_minmax(220px,4fr)] md:gap-8 lg:grid-cols-[minmax(0,7fr)_minmax(260px,3fr)] lg:gap-16">
            <div class="mx-auto flex w-full max-w-2xl flex-col justify-center pt-4 text-left md:pt-0 lg:mx-0 lg:max-w-3xl">
              <h1 class="mb-4 text-[2.32rem] leading-[1.15] tracking-tight md:mb-5 md:text-[2.65rem] lg:text-[3.75rem] xl:text-[4.2rem]">
                Your Christian companion, daily.
              </h1>
              <p class="mb-6 max-w-xl text-[1.04rem] leading-relaxed text-[var(--dove-muted)] md:mb-8 md:text-[1.05rem] lg:text-[1.16rem]">
                Chat, pray, and do devotionals with Dove.
              </p>
              <div>
                <a
                  target="_blank"
                  rel="noopener noreferrer"
                  href="https://apps.apple.com"
                  class="inline-flex items-center rounded-full bg-black px-8 py-3 text-sm font-medium text-white transition hover:opacity-90"
                >
                  Meet Dove
                </a>
              </div>
            </div>

            <div class="flex w-full items-center justify-center overflow-visible md:justify-end">
              <div class="w-full max-w-[620px] shrink-0 bg-[var(--dove-bg)] sm:max-w-[760px] md:max-w-[860px] lg:max-w-[980px] xl:max-w-[1080px]">
                <img
                  src="/hero.png"
                  alt="Dove app hero"
                  class="h-auto w-full object-contain"
                />
              </div>
            </div>
          </div>
        </div>

        <div class="fixed inset-x-4 bottom-4 z-30 flex flex-col gap-3 rounded-2xl bg-[color:color-mix(in_srgb,var(--dove-bg)_88%,white_12%)] px-4 py-3 text-sm text-[var(--dove-muted)] shadow-[0_10px_30px_rgba(0,0,0,0.08)] backdrop-blur sm:flex-row sm:items-center sm:justify-between md:absolute md:inset-x-12 md:bottom-8 md:rounded-none md:bg-transparent md:px-0 md:py-0 md:shadow-none md:backdrop-blur-0">
          <div class="flex flex-wrap items-center gap-x-5 gap-y-2">
            <a class="transition hover:text-black" href="/support">Support</a>
            <a class="transition hover:text-black" href="/privacy">Privacy</a>
            <a class="transition hover:text-black" href="/terms">Terms</a>
            <a class="transition hover:text-black" href="https://support.apple.com/en-us/118428" target="_blank" rel="noopener noreferrer">Manage Subscription</a>
          </div>
          <div class="flex flex-wrap items-center gap-3">
            <a target="_blank" rel="noopener noreferrer" aria-label="Instagram" class="inline-flex h-9 w-9 items-center justify-center rounded-full border border-black/15 bg-white/70 text-black transition hover:bg-white hover:text-black" href="https://www.instagram.com/Dove_fyiii/">
              <svg viewBox="0 0 24 24" class="h-5 w-5 fill-current" aria-hidden="true">
                <path d="M7.75 2h8.5A5.75 5.75 0 0 1 22 7.75v8.5A5.75 5.75 0 0 1 16.25 22h-8.5A5.75 5.75 0 0 1 2 16.25v-8.5A5.75 5.75 0 0 1 7.75 2Zm0 1.5A4.25 4.25 0 0 0 3.5 7.75v8.5A4.25 4.25 0 0 0 7.75 20.5h8.5a4.25 4.25 0 0 0 4.25-4.25v-8.5A4.25 4.25 0 0 0 16.25 3.5h-8.5Zm8.75 1.75a1 1 0 1 1 0 2 1 1 0 0 1 0-2ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 1.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7Z"/>
              </svg>
            </a>
            <a target="_blank" rel="noopener noreferrer" aria-label="TikTok" class="inline-flex h-9 w-9 items-center justify-center rounded-full border border-black/15 bg-white/70 text-black transition hover:bg-white hover:text-black" href="https://www.tiktok.com/@Dove_fyi">
              <svg viewBox="0 0 24 24" class="h-5 w-5 fill-current" aria-hidden="true">
                <path d="M14.5 3h2.1c.3 2 1.4 3.2 3.4 3.5v2.2c-1.3 0-2.4-.4-3.4-1.1V14a5 5 0 1 1-5-5c.3 0 .6 0 .9.1v2.3a2.8 2.8 0 0 0-.9-.1 2.7 2.7 0 1 0 2.9 2.7V3Z"/>
              </svg>
            </a>
            <a target="_blank" rel="noopener noreferrer" aria-label="YouTube" class="inline-flex h-9 w-9 items-center justify-center rounded-full border border-black/15 bg-white/70 text-black transition hover:bg-white hover:text-black" href="https://www.youtube.com/@DoveFYI">
              <svg viewBox="0 0 24 24" class="h-5 w-5 fill-current" aria-hidden="true">
                <path d="M21.6 7.2a2.8 2.8 0 0 0-2-2C17.8 4.7 12 4.7 12 4.7s-5.8 0-7.6.5a2.8 2.8 0 0 0-2 2C2 9 2 12 2 12s0 3 .4 4.8a2.8 2.8 0 0 0 2 2c1.8.5 7.6.5 7.6.5s5.8 0 7.6-.5a2.8 2.8 0 0 0 2-2c.4-1.8.4-4.8.4-4.8s0-3-.4-4.8ZM10 15.5v-7l6 3.5-6 3.5Z"/>
              </svg>
            </a>
            <a target="_blank" rel="noopener noreferrer" aria-label="LinkedIn" class="inline-flex h-9 w-9 items-center justify-center rounded-full border border-black/15 bg-white/70 text-black transition hover:bg-white hover:text-black" href="https://www.linkedin.com/company/fyi-Dove/">
              <svg viewBox="0 0 24 24" class="h-5 w-5 fill-current" aria-hidden="true">
                <path d="M5.3 8.7A1.7 1.7 0 1 1 5.3 5a1.7 1.7 0 0 1 0 3.7ZM3.8 10h3v10h-3V10Zm5.1 0h2.9v1.4h.1c.4-.8 1.4-1.7 3-1.7 3.2 0 3.8 2.1 3.8 4.9V20h-3v-4.8c0-1.1 0-2.6-1.6-2.6s-1.8 1.2-1.8 2.5V20h-3V10Z"/>
              </svg>
            </a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
