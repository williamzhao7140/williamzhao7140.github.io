<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>william likes product design</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family: Arial, Helvetica, sans-serif;
      }

      .stage {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .rive-wrap {
        width: 60vw;
        height: 60vh;
      }

      #rive-canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .corner {
        position: fixed;
        right: 16px;
        bottom: 16px;
        color: rgba(255, 255, 255, 0.9);
        text-align: right;
        font-size: 14px;
        line-height: 1.2;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <div class="rive-wrap">
        <canvas id="rive-canvas" aria-label="Interactive Rive animation"></canvas>
      </div>
      <div class="corner">
        <div>williamzhao474 [at] gmail [dot] com</div>
        <div>:3</div>
      </div>
    </main>

    <script src="https://unpkg.com/@rive-app/canvas@2.31.2"></script>
    <script>
      const canvas = document.getElementById('rive-canvas');
      let riveInstance;

      function resizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.floor(canvas.clientWidth * dpr);
        canvas.height = Math.floor(canvas.clientHeight * dpr);
        if (riveInstance) {
          riveInstance.resizeDrawingSurfaceToCanvas();
        }
      }

      riveInstance = new rive.Rive({
        src: '/cat.riv',
        canvas,
        autoplay: true,
        fit: rive.Fit.Contain,
        alignment: rive.Alignment.Center,
        onLoad: () => {
          if (Array.isArray(riveInstance.stateMachineNames) && riveInstance.stateMachineNames.length > 0) {
            riveInstance.stateMachineNames.forEach((name) => riveInstance.play(name));
          }
          resizeCanvas();
        },
      });

      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
    </script>
  </body>
</html>
